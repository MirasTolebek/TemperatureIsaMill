<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shift Logger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Фиксация всего приложения */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Запрет скролла страницы целиком */
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: manipulation;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Область списка */
        #scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* ВАЖНО: Огромный отступ снизу для клавиатуры */
            padding-bottom: 300px; 
        }

        .input-row {
            transition: background-color 0.2s;
            border-bottom: 1px solid #f3f4f6;
        }
        .input-row:focus-within {
            background-color: #eff6ff;
        }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- 1. ШАПКА -->
        <div class="flex-none bg-white z-10 shadow-sm border-b border-gray-200">
            <div class="flex justify-between items-center px-4 py-3">
                <h1 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-clipboard-list text-blue-600"></i> Температура IsaMill
                </h1>
                
                <!-- Кнопка очистки (увеличена зона нажатия) -->
                <button id="reset-btn" onclick="performReset()" class="text-red-400 p-3 -mr-2 active:text-red-600 active:bg-red-50 rounded-full transition-all">
                    <i class="fas fa-trash-alt text-xl pointer-events-none"></i>
                </button>
            </div>
            
            <div class="px-3 pb-3">
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button id="tab-up" onclick="switchTab('up')" class="flex-1 py-2 rounded-md text-sm font-bold transition-all shadow-sm bg-white text-gray-900 border border-gray-200">
                        Подъемная
                    </button>
                    <button id="tab-down" onclick="switchTab('down')" class="flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700">
                        Неподъемная
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. СПИСОК -->
        <div id="scroll-area">
            <div id="inputs-container" class="w-full">
                <!-- Строки 1-16 -->
            </div>
        </div>

        <!-- 3. КНОПКИ (Фиксированы внизу) -->
        <div class="flex-none bg-white border-t border-gray-200 p-4 pb-6 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            <button onclick="submitData()" id="submit-btn" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-blue-100 transition-transform active:scale-95 flex items-center justify-center gap-3">
                <span>Копировать и Отправить</span>
                <i class="fas fa-paper-plane text-sm opacity-80"></i>
            </button>
        </div>
    </div>

    <!-- Скрытый iframe -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {finishedSubmit();}"></iframe>

    <!-- Уведомление -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none z-50 text-sm font-medium flex items-center gap-2">
        <i class="fas fa-check-circle text-green-400"></i> <span id="toast-text">Готово</span>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        // Обновленная ссылка с ID полей: Side=2090680062, Data=1628376572
        const GOOGLE_CONFIG = {
            action: 'https://docs.google.com/forms/d/e/1FAIpQLSeh8Dk1Q6i9ffDrWFOSsJoWV0hIpHWpBMuBX3rFtFJGb9yVyA/formResponse',
            sideId: '2090680062',
            dataId: '1628376572'
        };

        let currentSide = 'up';
        let submitted = false;
        const data = { 
            up: Array(16).fill(''), 
            down: Array(16).fill('') 
        };
        const titles = { up: 'Подъемная сторона', down: 'Неподъемная сторона' };

        window.onload = () => { renderInputs(); };

        function renderInputs() {
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';
            
            data[currentSide].forEach((val, index) => {
                const row = document.createElement('div');
                row.className = 'input-row flex items-center px-4 h-16 w-full';
                row.id = `row-${index}`;
                
                row.innerHTML = `
                    <div class="w-8 text-gray-400 font-bold text-lg text-right mr-4 select-none">${index + 1})</div>
                    <input 
                        type="tel" 
                        inputmode="decimal" 
                        id="input-${index}"
                        value="${val}"
                        class="flex-1 text-2xl font-semibold text-gray-800 bg-transparent outline-none placeholder-gray-200 h-full w-full"
                        placeholder="00,0"
                        oninput="handleInput(event, ${index})"
                        onkeydown="handleKeyDown(event, ${index})"
                        onfocus="handleFocus(${index})"
                        autocomplete="off"
                    >
                `;
                container.appendChild(row);
            });
        }

        function handleInput(e, index) {
            let val = e.target.value.replace(/[^0-9]/g, '');
            
            if (val.length >= 3) {
                const formatted = val.substring(0, 2) + ',' + val.substring(2, 3);
                data[currentSide][index] = formatted;
                e.target.value = formatted;
                
                const next = document.getElementById(`input-${index + 1}`);
                if (next) {
                    next.focus();
                } else {
                    e.target.blur();
                }
            } else {
                data[currentSide][index] = val;
                e.target.value = val;
            }
        }

        function handleFocus(index) {
            setTimeout(() => {
                const el = document.getElementById(`row-${index}`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);
        }

        function handleKeyDown(e, index) {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                e.preventDefault();
                const prev = document.getElementById(`input-${index - 1}`);
                prev.focus();
                
                let val = data[currentSide][index - 1];
                if (val) {
                    let newVal = val.slice(0, -1);
                    if (newVal.endsWith(',')) newVal = newVal.slice(0, -1);
                    data[currentSide][index - 1] = newVal;
                    prev.value = newVal;
                }
            }
        }

        function submitData() {
            const btn = document.getElementById('submit-btn');
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            const sideStr = titles[currentSide];
            const dataStr = data[currentSide].map((v, i) => `${i+1}) ${v||'-'}`).join('\n');
            const clipboardText = `${sideStr} [${dateStr}]\n` + dataStr;

            // 1. Копируем в буфер
            const ta = document.createElement('textarea');
            ta.value = clipboardText;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);

            // 2. Отправляем в Google
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
            
            const form = document.createElement('form');
            form.action = GOOGLE_CONFIG.action;
            form.method = 'POST';
            form.target = 'hidden_iframe';
            form.style.display = 'none';

            const addField = (id, value) => {
                const input = document.createElement('textarea');
                input.name = `entry.${id}`;
                input.value = value;
                form.appendChild(input);
            };

            addField(GOOGLE_CONFIG.sideId, sideStr);
            addField(GOOGLE_CONFIG.dataId, dataStr);

            document.body.appendChild(form);
            submitted = true;
            form.submit();
            
            setTimeout(() => { document.body.removeChild(form); }, 2000);
        }

        function finishedSubmit() {
            if (!submitted) return;
            submitted = false;
            document.getElementById('submit-btn').innerHTML = '<span>Копировать и Отправить</span><i class="fas fa-paper-plane text-sm opacity-80"></i>';
            showToast("Отправлено!");
        }

        // --- ФУНКЦИЯ ОЧИСТКИ ---
        function performReset() {
            // Используем window.confirm, чтобы точно вызвать диалог
            if (window.confirm('Очистить все данные этой таблицы?')) {
                // Создаем новый пустой массив
                data[currentSide] = new Array(16).fill('');
                // Принудительно перерисовываем
                renderInputs();
                showToast("Очищено");
            }
        }

        function switchTab(side) {
            currentSide = side;
            const upBtn = document.getElementById('tab-up');
            const downBtn = document.getElementById('tab-down');
            
            const activeClass = "flex-1 py-2 rounded-md text-sm font-bold transition-all shadow-sm bg-white text-gray-900 ring-1 ring-gray-200";
            const inactiveClass = "flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700";

            if (side === 'up') {
                upBtn.className = activeClass;
                downBtn.className = inactiveClass;
            } else {
                downBtn.className = activeClass;
                upBtn.className = inactiveClass;
            }
            renderInputs();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => { t.style.opacity = '0'; }, 2500);
        }
    </script>
</body>
</html>
